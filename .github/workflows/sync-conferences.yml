name: Sync conferences

on:
  workflow_dispatch:
  schedule:
    - cron: "17 2 * * *"

permissions:
  contents: write

concurrency:
  group: sync-conferences
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: python -m pip install PyYAML

      - name: Rebuild filtered conferences
        run: python scripts/sync_conferences.py

      - name: Commit changes
        run: |
          if git diff --quiet -- _data/conferences.yml; then
            echo "No changes to commit"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add _data/conferences.yml
          git commit -m "Sync conferences from upstream and gist"
          git push
